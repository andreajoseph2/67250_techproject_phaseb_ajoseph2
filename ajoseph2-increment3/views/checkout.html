<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Your name">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <title>MonoMuse</title>
    <script src="../static/script.js" defer></script>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img id="logo" src="../static/final logo.png" alt="MonoMuse Museum Logo">
        <nav>
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Tickets</a>
            <a href="checkout.html" id="navselected">Checkout</a>
        </nav>
    </header>
    <main>
        <form action="#">
            <p>
                <label for="name">Name: (required)</label><br>
                <input type="text" id="name" name="name" required>
            </p>
            <p>
                <label for="email">Email: (required)</label><br>
                <input type="email" id="email" name="email" required>
            </p>
            <p>
                <label for="ticket-type">Ticket Type: (required)</label><br>
                <select id="ticket-type" name="ticket-type" required>
                    <option value="">Select a ticket type</option>
                    <option value="adult">Adult - $18</option>
                    <option value="student">Student - $10</option>
                    <option value="member">Member - $15</option>
                </select>
            </p>
            <p>
                <label for="quantity">Ticket Quantity: (required)</label><br>
                <input type="number" id="quantity" name="quantity" min="1" required>
            </p>
            <button type="submit">Place Order</button>
        </form>
    </main>
    <footer>
        <p>&copy; <span id="current-year"></span> MonoMuse Museum. All rights reserved.</p>
    </footer>
</body>
</html>
