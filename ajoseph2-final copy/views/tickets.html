<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Your name">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <title>MonoMuse</title>
    <script src="../static/script.js" defer></script>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">

        <header class="header">
            <img id="logo" src="../static/final logo.png" alt="MonoMuse Museum Logo">
            <nav class="nav_bar">
                <button class="hamburger" id="hamburger">&#9776;</button>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="explore.html">Explore</a></li>
                    <li><a href="exhibitions.html">Exhibitions</a></li>
                    <li><a href="buytickets.html">Tickets</a></li>
                    <li><a href="checkout.html">Checkout</a></li>
                </ul>
            </nav>
        </header>

        

        <main class="main">
            <h2>Admission & Tickets</h2>
            <table border="1">
                <thead>
                    <tr>
                        <th>Ticket Type</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Adult</td>
                        <td>$18</td>
                        <td><button class="buy-btn">Buy Now</button></td>
                    </tr>
                    <tr>
                        <td>Student</td>
                        <td>$10</td>
                        <td><button class="buy-btn">Buy Now</button></td>
                    </tr>
                </tbody>
            </table>

            <div id="purchase-form-container" style="display: none; margin-top: 20px;">
                <h3>Complete Your Purchase</h3>
                <form id="ticket-form">
                    <label for="t-name">Name:</label><br>
                    <input type="text" id="t-name" required><br>
                    <label for="t-qty">Quantity:</label><br>
                    <input type="number" id="t-qty" min="1" value="1"><br><br>
                    <button type="submit">Submit Order</button>
                </form>
            </div>
        </main>

        <figure class="main_img">
            </figure>

        <footer class="footer">
            <p>&copy; <span id="current-year"></span> MonoMuse Museum. All rights reserved.</p>
        </footer>

    </div>
    <script src="../static/script.js"></script>
</body>
</html>
